# =============================================================================
#  Déploiement de la version WebAssembly de NeoST sur GitHub Pages.
#
#  Construit le frontend web (Emscripten) avec TOUT rom/ et disks/ embarqués
#  (NEOST_WEB_FREE_ONLY=OFF) pour pouvoir tout tester à distance : EmuTOS US/FR,
#  TOS 1.02 et les disquettes. ⚠ Le TOS propriétaire et les jeux sous copyright
#  sont alors publiés publiquement — dépôt à garder privé si ce n'est pas voulu
#  (passer NEOST_WEB_FREE_ONLY=ON pour ne publier qu'EmuTOS + diskA).
#
#  Prérequis côté dépôt : Settings → Pages → « Build and deployment » →
#  Source = « GitHub Actions ». Le site est alors publié sur
#  https://<utilisateur>.github.io/neost/
# =============================================================================
name: Déploiement web (WASM)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (avec sous-modules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Installer Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Générer les opcodes Musashi
        run: |
          cc -o extern/Musashi/m68kmake extern/Musashi/m68kmake.c
          ( cd extern/Musashi && ./m68kmake . m68k_in.c )

      - name: Configurer (WASM, tout rom/ et disks/ embarqués)
        run: emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release -DNEOST_WEB_FREE_ONLY=OFF

      - name: Compiler le frontend web (sortie → wasm/)
        run: cmake --build build-web -j --target neost-web

      - name: Téléverser l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: wasm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
