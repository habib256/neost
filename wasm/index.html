<!doctypehtml><html lang=fr><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1"name=viewport><title>NeoST — Atari ST dans le navigateur</title><style>:root{color-scheme:dark}body{margin:0;background:#16161a;color:#e8e8ec;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center}h1{font-size:1.2rem;margin:.8rem 0 .2rem;font-weight:600}.sub{color:#8a8a96;font-size:.8rem;margin-bottom:.6rem}#toolbar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:.6rem;max-width:680px;justify-content:center}button,label.file,select{background:#2a2a33;color:#e8e8ec;border:1px solid #3a3a45;border-radius:6px;padding:.4rem .7rem;font-size:.85rem;cursor:pointer}button:hover,label.file:hover,select:hover{background:#343440}input[type=file]{display:none}#canvas{border:1px solid #000;background:#000;image-rendering:pixelated;width:640px;height:400px;outline:0}#status{font-size:.78rem;color:#8a8a96;margin-top:.5rem;min-height:1.1em}.hint{font-size:.75rem;color:#6a6a76;max-width:660px;text-align:center;margin:.4rem 0 1rem}code{background:#2a2a33;padding:0 .3em;border-radius:4px}</style></head><body><h1>NeoST — émulateur Atari ST</h1><div class=sub>WebAssembly · cœur 68000 Musashi · EmuTOS</div><div id=toolbar><button id=btnReset>Reset</button> <button id=btnMono>Passer en Mono</button> <select id=diskSel title="Disquette préchargée"></select> <button id=btnMount>Monter + Reset</button> <label class=file>Charger un .st… <input accept=.st id=diskFile type=file></label></div><canvas id=canvas oncontextmenu=event.preventDefault() tabindex=0></canvas><div id=status>Chargement du module WebAssembly…</div><div class=hint>Cliquez dans l'écran pour <b>capturer la souris</b> (curseur GEM), <code>Échap</code> pour la libérer. Le clavier est routé vers l'IKBD. Couleur = basse résolution, Mono = haute résolution.</div><script>var statusEl=document.getElementById("status"),monoOn=!1,ready=!1,Module={canvas:function(){var e=document.getElementById("canvas");return e.addEventListener("click",(function(){e.focus()})),e}(),print:function(e){console.log(e)},printErr:function(e){console.warn(e)},setStatus:function(e){ready&&!e||statusEl&&(statusEl.textContent=e||"")}};function callReset(){ready&&Module.ccall("neost_reset")}function callMono(e){ready&&Module.ccall("neost_set_mono",null,["number"],[e])}function callMount(e){ready&&Module.ccall("neost_mount_disk",null,["string"],[e])}Module.setStatus("Chargement du module WebAssembly…"),window.neostOnReady=function(){ready=!0,statusEl&&(statusEl.textContent="Prêt — cliquez dans l'écran pour jouer.");try{var e=document.getElementById("diskSel"),t=Module.FS.readdir("/disks").filter((function(e){return/\.st$/i.test(e)})).sort();e.innerHTML="",t.forEach((function(t){var n=document.createElement("option");n.value="/disks/"+t,n.textContent=t,e.appendChild(n)}))}catch(e){console.warn("FS.readdir /disks:",e)}},document.getElementById("btnReset").addEventListener("click",callReset),document.getElementById("btnMono").addEventListener("click",(function(){callMono((monoOn=!monoOn)?1:0),this.textContent=monoOn?"Passer en Couleur":"Passer en Mono"})),document.getElementById("btnMount").addEventListener("click",(function(){var e=document.getElementById("diskSel").value;callMount(e),Module.setStatus("Monté : "+e.split("/").pop())})),document.getElementById("diskFile").addEventListener("change",(function(e){var t=e.target.files[0];if(t&&ready){var n=new FileReader;n.onload=function(){var e=new Uint8Array(n.result),o="/disks/_upload.st";Module.FS.writeFile(o,e),callMount(o),Module.setStatus("Monté : "+t.name+" ("+e.length+" octets)")},n.readAsArrayBuffer(t)}}))</script><script async src=index.js></script></body></html>
